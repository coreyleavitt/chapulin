name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GTK3 dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Install GTK3 dev (macOS)
        if: runner.os == 'macOS'
        run: brew install gtk+3

      - name: Install dependencies
        run: nimble install -d -y

      - name: Run unit tests
        run: nimble test

      - name: Build CLI
        run: nim c -d:release -o:chapulin src/chapulin.nim

      - name: Build GUI (Linux/macOS)
        if: runner.os != 'Windows'
        run: nim c --threads:on -d:release -o:chapulin_gui gui/desktop/chapulin_gui.nim

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nimble install -d -y

      - name: Check compilation (strict hints)
        run: nim check --hints:on src/chapulin.nim
